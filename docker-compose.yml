services:
  sample-validate:
    build:
      context: .
      dockerfile: docker/sut/rule_only/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      MODEL_NAME: ${MODEL_NAME:-gemma4:e2b}
      SEED: ${SEED:-42}
      MAX_ITEMS: "5"
      TIER: ${TIER:-canonical}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "bash",
        "-lc",
        "set -o pipefail; python -u -m benchmark.sample_validate | tee results/sample_validation/sample_validate.log",
      ]
    volumes:
      - ./:/app
      - ./results:/app/results
      - ./datasets:/app/datasets:ro
      - ./benchmark:/app/benchmark:ro

  full-run:
    build:
      context: .
      dockerfile: docker/sut/rule_only/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_READY_TIMEOUT_S: ${OLLAMA_READY_TIMEOUT_S:-180}
      MODEL_NAME: ${MODEL_NAME:-gemma4:e2b}
      SEED: ${SEED:-42}
      DATASET_ROOT: ${DATASET_ROOT:-/app/results/generated_datasets/v1}
      DATASET_SYNTHETIC_COUNT: ${DATASET_SYNTHETIC_COUNT:-1200}
      DATASET_SEMI_REAL_COUNT: ${DATASET_SEMI_REAL_COUNT:-120}
      RUNS_PER_PAIR: ${RUNS_PER_PAIR:-20}
      MAX_ITEMS: ${MAX_ITEMS:-1200}
      TIER: ${TIER:-canonical}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "bash",
        "-lc",
        "set -o pipefail; python -u -m benchmark.orchestrate | tee results/full_run.log",
      ]
    volumes:
      - ./:/app
      - ./results:/app/results
      - ./datasets:/app/datasets:ro
      - ./benchmark:/app/benchmark:ro

  run-scenario:
    build:
      context: .
      dockerfile: docker/sut/rule_only/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      MODEL_NAME: ${MODEL_NAME:-gemma4:e2b}
      SEED: ${SEED:-42}
      MAX_ITEMS: ${MAX_ITEMS:-100}
      TIER: ${TIER:-canonical}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "bash",
        "-lc",
        "set -o pipefail; python -u -m benchmark.run --scenario full_framework --out results/full_framework | tee results/full_framework/run_scenario.log",
      ]
    volumes:
      - ./:/app
      - ./results:/app/results
      - ./datasets:/app/datasets:ro
      - ./benchmark:/app/benchmark:ro

  evaluate:
    build:
      context: .
      dockerfile: docker/sut/rule_only/Dockerfile
    command: ["python", "-u", "-c", "from pathlib import Path; import json; from benchmark.evaluate import evaluate_run; print(json.dumps(evaluate_run(Path('results/full_framework/predictions')), indent=2))"]
    volumes:
      - ./:/app

  report:
    build:
      context: .
      dockerfile: docker/sut/rule_only/Dockerfile
    command: ["python", "-u", "-c", "from benchmark.report import generate_final_report; print(generate_final_report())"]
    volumes:
      - ./:/app


  simple-llm-test:
    build:
      context: .
      dockerfile: docker/sut/rule_only/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      MODEL_NAME: ${MODEL_NAME:-gemma4:e2b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "bash",
        "-lc",
        "set -o pipefail; python -u -m benchmark.simple_llm_test --model $${MODEL_NAME}",
      ]
    volumes:
      - ./:/app
